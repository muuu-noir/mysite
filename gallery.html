    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>GALLERY | 396 FOLIO</title>
    <link rel="icon" href="img/profile/profile_avatar.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/destyle.css@1.0.15/destyle.css" />

<body>
    <site-header></site-header>
    <main>
        <section class="container">
            <section-title title="GALLERY" center reveal></section-title>

            <!-- Category Description -->
            <glass-card id="category-info" reveal>
                <h3 id="category-title">Selected Works</h3>
                <p id="category-text">水彩、鉛筆、デジタル。手法に縛られず、その時々の感性が形作った作品たち。混ざり合う色彩と線のリズムをお楽しみください。</p>
            </glass-card>

            <!-- Shuffle Control -->
            <div class="shuffle-wrap reveal">
                <button id="shuffle-btn" class="filter-btn">
                    <i class="fas fa-random"></i> SHUFFLE
                </button>
            </div>

            <!-- Gallery Grid -->
            <div id="gallery-grid" class="gallery-grid">
                <!-- JavaScript will populate this -->
            </div>
        </section>
    </main>
    <site-footer></site-footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('gallery-grid');
            const shuffleBtn = document.getElementById('shuffle-btn');
            const prefixes = ['watercolor', 'pencil', 'digital', 'work'];

            // Shuffle algorithm (Fisher-Yates)
            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // Function to shuffle existing items in the grid
            function shuffleGallery() {
                const items = Array.from(document.querySelectorAll('.gallery-item'));
                if (items.length === 0) return;

                items.forEach(item => {
                    item.classList.remove('active');
                    item.style.opacity = '0';
                    item.style.transform = 'scale(0.95)';
                });

                setTimeout(() => {
                    grid.innerHTML = '';
                    const shuffledItems = shuffle(items);
                    shuffledItems.forEach(item => {
                        grid.appendChild(item);
                        item.style.opacity = '';
                        item.style.transform = '';
                        setTimeout(() => {
                            if (window.revealObserver) {
                                window.revealObserver.observe(item);
                            } else {
                                item.classList.add('active');
                            }
                        }, 50);
                    });
                }, 400);
            }

            shuffleBtn.addEventListener('click', () => {
                shuffleGallery();
            });

            // Universal Auto-Loader: Probes for images automatically
            async function loadImages() {
                console.log("[Gallery] Smart Patrol: Discovering assets...");
                const allItems = [];
                const loadPromises = [];

                for (const prefix of prefixes) {
                    // Try up to 100 images for each prefix
                    // If 2 consecutive numbers are missing, we stop for that prefix.
                    let missingCount = 0;
                    for (let i = 1; i <= 100; i++) {
                        if (missingCount >= 2) break;

                        const p = new Promise(resolve => {
                            const img = new Image();
                            const src = `img/gallery/${prefix}_${i}.jpg`;
                            img.onload = () => {
                                const item = document.createElement('div');
                                item.className = 'gallery-item reveal';
                                item.dataset.category = prefix;
                                item.innerHTML = `<img src="${src}" alt="${prefix} image" loading="lazy">`;
                                resolve({ item, success: true });
                            };
                            img.onerror = () => {
                                resolve({ success: false });
                            };
                            img.src = src;
                        });

                        const result = await p;
                        if (result.success) {
                            allItems.push(result.item);
                            missingCount = 0; // Reset missing counter
                        } else {
                            missingCount++;
                        }
                    }
                }

                console.log(`[Gallery] Smart Patrol result: Found ${allItems.length} works.`);

                const shuffledResults = shuffle(allItems);

                shuffledResults.forEach((item, index) => {
                    grid.appendChild(item);
                    setTimeout(() => {
                        if (window.revealObserver) {
                            window.revealObserver.observe(item);
                        } else {
                            item.classList.add('active');
                        }
                    }, index * 20);
                });
            }

            loadImages();
        });
    </script>
</body>

</html>
