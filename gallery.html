<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>GALLERY | 396 FOLIO</title>
    <link rel="icon" href="img/profile/profile_avatar.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/destyle.css@1.0.15/destyle.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/config.js"></script>
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
</head>


<body>
    <site-header></site-header>
    <main>
        <section class="container">
            <section-title title="GALLERY" center reveal></section-title>

            <!-- Category Description -->
            <glass-card id="category-info" reveal>
                <h3 id="category-title">Selected Works</h3>
                <p id="category-text">水彩、鉛筆、デジタル。手法に縛られず、その時々の感性が形作った作品たち。混ざり合う色彩と線のリズムをお楽しみください。</p>
            </glass-card>

            <!-- Shuffle Control -->
            <div class="shuffle-wrap reveal">
                <button id="shuffle-btn" class="filter-btn">
                    <i class="fas fa-random"></i> SHUFFLE
                </button>
            </div>

            <!-- Gallery Grid -->
            <div id="gallery-grid" class="gallery-grid">
                <!-- JavaScript will populate this -->
            </div>
        </section>
    </main>
    <site-footer></site-footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('gallery-grid');
            const shuffleBtn = document.getElementById('shuffle-btn');
            const prefixes = ['watercolor', 'pencil', 'digital', 'work'];

            // Shuffle algorithm (Fisher-Yates)
            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // Function to shuffle existing items in the grid
            function shuffleGallery() {
                const items = Array.from(document.querySelectorAll('.gallery-item'));
                if (items.length === 0) return;

                items.forEach(item => {
                    item.classList.remove('active');
                    item.style.opacity = '0';
                    item.style.transform = 'scale(0.95)';
                });

                setTimeout(() => {
                    grid.innerHTML = '';
                    const shuffledItems = shuffle(items);
                    shuffledItems.forEach(item => {
                        grid.appendChild(item);
                        item.style.opacity = '';
                        item.style.transform = '';
                        setTimeout(() => {
                            if (window.revealObserver) {
                                window.revealObserver.observe(item);
                            } else {
                                item.classList.add('active');
                            }
                        }, 50);
                    });
                }, 400);
            }

            shuffleBtn.addEventListener('click', () => {
                shuffleGallery();
            });

            // Universal Auto-Loader: Probes for images efficiently in parallel
            async function loadImages() {
                console.log("[Gallery] Initializing smart parallel loading...");
                const allItems = [];
                const batchSize = 40; // 一気に確認する枚数

                const probePrefix = async (prefix) => {
                    const promises = [];
                    for (let i = 1; i <= batchSize; i++) {
                        promises.push(new Promise(resolve => {
                            const img = new Image();
                            const src = `img/gallery/${prefix}_${i}.jpg`;
                            img.onload = () => {
                                const item = document.createElement('div');
                                item.className = 'gallery-item reveal';
                                item.dataset.category = prefix;
                                item.innerHTML = `<img src="${src}" alt="${prefix} image" loading="lazy">`;
                                resolve(item);
                            };
                            img.onerror = () => resolve(null);
                            img.src = src;
                        }));
                    }
                    const results = await Promise.all(promises);
                    return results.filter(item => item !== null);
                };

                const prefixResults = await Promise.all(prefixes.map(p => probePrefix(p)));
                prefixResults.forEach(items => allItems.push(...items));

                console.log(`[Gallery] Discovery complete. Found ${allItems.length} works.`);

                if (allItems.length === 0) {
                    console.warn("[Gallery] No images found. Please check img/gallery/ folder.");
                    grid.innerHTML = '<p class="flex-center" style="grid-column: 1/-1; padding: 4rem; opacity: 0.5;">No works found in gallery.</p>';
                    return;
                }

                const shuffledResults = shuffle(allItems);
                grid.innerHTML = ''; // クリア

                shuffledResults.forEach((item, index) => {
                    grid.appendChild(item);

                    // Staggered Reveal
                    setTimeout(() => {
                        if (window.revealObserver) {
                            window.revealObserver.observe(item);
                        } else {
                            item.classList.add('active');
                        }

                        // Safety fallback: Force show after a while even if observer misses it
                        setTimeout(() => {
                            item.classList.add('active');
                        }, 2000);
                    }, index * 15);
                });
            }

            loadImages();
        });
    </script>
</body>

</html>
