    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">

    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/gallery.js" defer></script>

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "GALLERY | 396 FOLIO",
        "description": "手塚桃子のアートギャラリー。鉛筆画、水彩画、デジタルアートなど、移ろう時間をテーマにした作品を展示しています。",
        "url": "https://mog147.github.io/mysite/gallery.html",
        "image": "https://mog147.github.io/mysite/img/gallery/pencil_1_1.jpg",
        "author": {
            "@type": "Person",
            "name": "手塚桃子"
        },
        "mainEntity": {
            "@type": "ImageGallery",
            "name": "Selected Works",
            "description": "水彩、鉛筆、デジタル。手法に縛られず、その時々の感性が形作った作品たち。"
        }
    }
    </script>

</head>


<body>
    <site-header></site-header>
    <main id="main-content">
        <section class="container">
            <section-title title="GALLERY" center reveal></section-title>

            <!-- Category Description -->
            <glass-card id="category-info" reveal>
                <h3 id="category-title">Selected Works</h3>
                <p id="category-text">水彩、鉛筆、デジタル。手法に縛られず、その時々の感性が形作った作品たち。混ざり合う色彩と線のリズムをお楽しみください。</p>
            </glass-card>

            <!-- Filter Controls -->
            <div class="filter-wrap reveal">
                <button class="filter-btn active" data-filter="all">ALL</button>
                <button class="filter-btn" data-filter="pencil">PENCIL</button>
                <button class="filter-btn" data-filter="watercolor">WATERCOLOR</button>
            </div>

            <!-- Shuffle Control -->
            <div class="shuffle-wrap reveal">
                <button id="shuffle-btn" class="filter-btn">
                    <i class="fas fa-random"></i> SHUFFLE
                </button>
            </div>

            <!-- Loading Indicator -->
            <div id="gallery-loader" class="flex-center gallery-loader">
                <div class="loader-ripple">
                    <div></div>
                    <div></div>
                </div>
                <p class="gallery-load-text">PREPARING COLLECTIONS</p>
            </div>

            <!-- Gallery Grid -->
            <div id="gallery-grid" class="gallery-grid" style="display: none;">
                <!-- JavaScript will populate this -->
            </div>

            <!-- Load More Control -->
            <div id="load-more-wrap" class="flex-center reveal" style="display: none;">
                <button id="load-more-btn" class="btn-cta">
                    MORE WORKS
                </button>
            </div>
        </section>
    </main>
    <site-footer></site-footer>
    <floating-cta href="contact.html">お問い合わせ</floating-cta>

    <style>
        .loader-ripple {
            display: inline-block;
            position: relative;
            width: 60px;
            height: 60px;
        }

        .loader-ripple div {
            position: absolute;
            border: 2px solid var(--color-indigo);
            opacity: 1;
            border-radius: 50%;
            animation: loader-ripple 1.5s cubic-bezier(0, 0.2, 0.8, 1) infinite;
        }

        .loader-ripple div:nth-child(2) {
            animation-delay: -0.5s;
        }

        @keyframes loader-ripple {
            0% {
                top: 30px;
                left: 30px;
                width: 0;
                height: 0;
                opacity: 1;
            }

            100% {
                top: 0;
                left: 0;
                width: 60px;
                height: 60px;
                opacity: 0;
            }
        }

        /* ボタン中央寄せのための微調整 */
        #load-more-wrap.flex-center {
            padding-bottom: 4rem;
        }
    </style>

</body>

</html>
