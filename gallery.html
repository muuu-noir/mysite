<!DOCTYPE html>
<html lang="ja">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BLHXZS4T3C"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-BLHXZS4T3C');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>GALLERY | 396 FOLIO</title>
    <link rel="icon" href="img/profile/profile_avatar.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/destyle.css@1.0.15/destyle.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/config.js"></script>
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
</head>


<body>
    <site-header></site-header>
    <main>
        <section class="container">
            <section-title title="GALLERY" center reveal></section-title>

            <!-- Category Description -->
            <glass-card id="category-info" reveal>
                <h3 id="category-title">Selected Works</h3>
                <p id="category-text">水彩、鉛筆、デジタル。手法に縛られず、その時々の感性が形作った作品たち。混ざり合う色彩と線のリズムをお楽しみください。</p>
            </glass-card>

            <!-- Shuffle Control -->
            <div class="shuffle-wrap reveal">
                <button id="shuffle-btn" class="filter-btn">
                    <i class="fas fa-random"></i> SHUFFLE
                </button>
            </div>

            <!-- Loading Indicator -->
            <div id="gallery-loader" class="flex-center" style="padding: 4rem; opacity: 0.8;">
                <div class="loader-ripple">
                    <div></div>
                    <div></div>
                </div>
                <p
                    style="font-family: 'Outfit', sans-serif; letter-spacing: 0.2em; font-size: 0.8rem; margin-top: 1rem;">
                    PREPARING COLLECTIONS</p>
            </div>

            <!-- Gallery Grid -->
            <div id="gallery-grid" class="gallery-grid" style="display: none;">
                <!-- JavaScript will populate this -->
            </div>

            <!-- Load More Control -->
            <div id="load-more-wrap" class="flex-center reveal" style="display: none; margin-top: 4rem;">
                <button id="load-more-btn" class="btn-cta">
                    MORE WORKS
                </button>
            </div>
        </section>
    </main>
    <site-footer></site-footer>

    <style>
        .loader-ripple {
            display: inline-block;
            position: relative;
            width: 60px;
            height: 60px;
        }

        .loader-ripple div {
            position: absolute;
            border: 2px solid var(--color-indigo);
            opacity: 1;
            border-radius: 50%;
            animation: loader-ripple 1.5s cubic-bezier(0, 0.2, 0.8, 1) infinite;
        }

        .loader-ripple div:nth-child(2) {
            animation-delay: -0.5s;
        }

        @keyframes loader-ripple {
            0% {
                top: 30px;
                left: 30px;
                width: 0;
                height: 0;
                opacity: 1;
            }

            100% {
                top: 0;
                left: 0;
                width: 60px;
                height: 60px;
                opacity: 0;
            }
        }

        /* ボタン中央寄せのための微調整 */
        #load-more-wrap.flex-center {
            padding-bottom: 4rem;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('gallery-grid');
            const loader = document.getElementById('gallery-loader');
            const shuffleBtn = document.getElementById('shuffle-btn');
            const loadMoreWrap = document.getElementById('load-more-wrap');
            const loadMoreBtn = document.getElementById('load-more-btn');

            // --- Baseline (Known image counts for instant render) ---
            const manifest = {
                watercolor: 11,
                pencil: 6,
                digital: 33,
                work: 0
            };

            let allFoundItems = [];
            let currentIndex = 0;
            const itemsPerPage = 9; // お嬢様御指定の9枚

            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            function createItem(prefix, i) {
                const item = document.createElement('div');
                item.className = 'gallery-item reveal';
                const src = `img/gallery/${prefix}_${i}.jpg`;
                item.innerHTML = `<img src="${src}" alt="${prefix} image" loading="lazy">`;
                return item;
            }

            function renderNextBatch() {
                const limit = Math.min(currentIndex + itemsPerPage, allFoundItems.length);
                const batch = allFoundItems.slice(currentIndex, limit);

                batch.forEach((item, i) => {
                    grid.appendChild(item);
                    setTimeout(() => {
                        if (window.revealObserver) window.revealObserver.observe(item);
                        else item.classList.add('active');
                    }, i * 30);
                });

                currentIndex = limit;

                // もし全件表示済みならボタンを隠す
                if (currentIndex >= allFoundItems.length) {
                    loadMoreWrap.style.display = 'none';
                } else {
                    loadMoreWrap.style.display = 'flex';
                }
            }

            async function discoverNewAssets() {
                const prefixes = Object.keys(manifest);
                for (const prefix of prefixes) {
                    let nextId = manifest[prefix] + 1;
                    for (let i = nextId; i < nextId + 5; i++) { // Limit background search depth
                        const exists = await new Promise(resolve => {
                            const img = new Image();
                            img.onload = () => resolve(true);
                            img.onerror = () => resolve(false);
                            img.src = `img/gallery/${prefix}_${i}.jpg`;
                        });
                        if (exists) {
                            allFoundItems.push(createItem(prefix, i));
                            console.log(`[Gallery] New discovery: ${prefix}_${i}`);
                        } else break;
                    }
                }
                // 背景での探索後、もし続きがあればボタンを表示状態に更新
                if (currentIndex < allFoundItems.length) {
                    loadMoreWrap.style.display = 'flex';
                }
            }

            // Initialization
            Object.entries(manifest).forEach(([prefix, count]) => {
                for (let i = 1; i <= count; i++) {
                    allFoundItems.push(createItem(prefix, i));
                }
            });

            allFoundItems = shuffle(allFoundItems);
            loader.style.display = 'none';
            grid.style.display = 'grid';
            renderNextBatch();

            discoverNewAssets(); // Search for updates in background

            // Event Listeners
            loadMoreBtn.addEventListener('click', () => {
                renderNextBatch();
            });

            shuffleBtn.addEventListener('click', () => {
                grid.innerHTML = '';
                currentIndex = 0;
                allFoundItems = shuffle(allFoundItems);
                renderNextBatch();
            });
        });
    </script>
</body>

</html>
