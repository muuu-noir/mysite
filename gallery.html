<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>GALLERY | 396 FOLIO</title>
    <link rel="icon" href="img/profile/profile_avatar.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/destyle.css@1.0.15/destyle.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/config.js"></script>
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
</head>


<body>
    <site-header></site-header>
    <main>
        <section class="container">
            <section-title title="GALLERY" center reveal></section-title>

            <!-- Category Description -->
            <glass-card id="category-info" reveal>
                <h3 id="category-title">Selected Works</h3>
                <p id="category-text">水彩、鉛筆、デジタル。手法に縛られず、その時々の感性が形作った作品たち。混ざり合う色彩と線のリズムをお楽しみください。</p>
            </glass-card>

            <!-- Shuffle Control -->
            <div class="shuffle-wrap reveal">
                <button id="shuffle-btn" class="filter-btn">
                    <i class="fas fa-random"></i> SHUFFLE
                </button>
            </div>

            <!-- Gallery Grid -->
            <div id="gallery-grid" class="gallery-grid">
                <!-- JavaScript will populate this -->
            </div>
        </section>
    </main>
    <site-footer></site-footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('gallery-grid');
            const shuffleBtn = document.getElementById('shuffle-btn');
            const prefixes = ['watercolor', 'pencil', 'digital', 'work'];

            // Shuffle algorithm (Fisher-Yates)
            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // Function to shuffle existing items in the grid
            function shuffleGallery() {
                const items = Array.from(document.querySelectorAll('.gallery-item'));
                if (items.length === 0) return;

                items.forEach(item => {
                    item.classList.remove('active');
                    item.style.opacity = '0';
                    item.style.transform = 'scale(0.95)';
                });

                setTimeout(() => {
                    grid.innerHTML = '';
                    const shuffledItems = shuffle(items);
                    shuffledItems.forEach(item => {
                        grid.appendChild(item);
                        item.style.opacity = '';
                        item.style.transform = '';
                        setTimeout(() => {
                            if (window.revealObserver) {
                                window.revealObserver.observe(item);
                            } else {
                                item.classList.add('active');
                            }
                        }, 50);
                    });
                }, 400);
            }

            let allFoundItems = []; // 発見された全アイテムを保持
            let currentIndex = 0;   // 現在表示されているインデックス
            const itemsPerPage = 12; // 一度に表示する枚数

            // Universal Auto-Loader: Efficient Asset Discovery
            async function discoverAssets() {
                console.log("[Gallery] Initializing discovery patrol...");
                const prefixes = ['watercolor', 'pencil', 'digital', 'work'];
                const batchSize = 35; // 少し控えめに

                const probePrefix = async (prefix) => {
                    const promises = [];
                    for (let i = 1; i <= batchSize; i++) {
                        promises.push(new Promise(resolve => {
                            const img = new Image();
                            const src = `img/gallery/${prefix}_${i}.jpg`;
                            img.onload = () => {
                                const item = document.createElement('div');
                                item.className = 'gallery-item reveal';
                                item.innerHTML = `<img src="${src}" alt="${prefix} image" loading="lazy">`;
                                resolve(item);
                            };
                            img.onerror = () => resolve(null);
                            img.src = src;
                        }));
                    }
                    return (await Promise.all(promises)).filter(n => n !== null);
                };

                const results = await Promise.all(prefixes.map(p => probePrefix(p)));
                allFoundItems = shuffle(results.flat());

                console.log(`[Gallery] Discovery complete. Found ${allFoundItems.length} works.`);

                if (allFoundItems.length === 0) {
                    grid.innerHTML = '<p class="flex-center" style="grid-column: 1/-1; padding: 4rem; opacity: 0.5;">No works found.</p>';
                } else {
                    renderNextBatch(); // 最初のバッチを表示
                }
            }

            // Function to render the next set of images
            function renderNextBatch() {
                const limit = Math.min(currentIndex + itemsPerPage, allFoundItems.length);
                const batch = allFoundItems.slice(currentIndex, limit);

                batch.forEach((item, i) => {
                    grid.appendChild(item);
                    setTimeout(() => {
                        if (window.revealObserver) window.revealObserver.observe(item);
                        else item.classList.add('active');
                    }, i * 30);
                });

                currentIndex = limit;

                // 次のバッチの準備（スクロール検知用の監視）
                if (currentIndex < allFoundItems.length) {
                    setupIntersectionObserver();
                }
            }

            // Infinite scroll trigger
            function setupIntersectionObserver() {
                const sentinel = document.createElement('div');
                sentinel.className = 'load-sentinel';
                sentinel.style.height = '10px';
                grid.appendChild(sentinel);

                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        observer.disconnect();
                        sentinel.remove();
                        renderNextBatch();
                    }
                }, { rootMargin: '400px' }); // 400px手前で読み込み開始

                observer.observe(sentinel);
            }

            // Initial Load
            discoverAssets();

            shuffleBtn.addEventListener('click', () => {
                grid.innerHTML = '';
                currentIndex = 0;
                allFoundItems = shuffle(allFoundItems);
                renderNextBatch();
            });
        });
    </script>
</body>

</html>
